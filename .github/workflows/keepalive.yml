name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging Streamlit app..."
          curl -s -o /dev/null -w "%{http_code}\n" https://urban-emissions-tool.streamlit.app
          echo "Ping complete"
